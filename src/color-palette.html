<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Cores - Primitive Tokens</title>
    <link rel="stylesheet" href="asset/css/colors.css">
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--neutral-100);
            color: var(--neutral-900);
            margin: 0;
            padding: 2rem;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        header {
            margin-bottom: 3rem;
            border-bottom: 2px solid var(--neutral-200);
            padding-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .header-title h1 {
            margin: 0 0 0.5rem 0;
            color: var(--primary-900);
        }

        .header-title p {
            margin: 0;
            color: var(--neutral-600);
        }

        .theme-selector-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .theme-selector-container label {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--neutral-700);
        }

        .theme-dropdown {
            padding: 0.6rem 2rem 0.6rem 1rem;
            font-size: 1rem;
            border: 2px solid var(--neutral-300);
            border-radius: 6px;
            background-color: var(--monochrome-100);
            color: var(--neutral-900);
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .theme-dropdown:focus {
            border-color: var(--primary-500);
        }

        h2 {
            margin: 2rem 0 1rem 0;
            text-transform: uppercase;
            font-size: 1.2rem;
            letter-spacing: 0.05em;
            color: var(--neutral-700);
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .color-swatch {
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            display: flex;
            flex-direction: column;
            height: 120px;
            transition: transform 0.2s ease;
        }

        .color-swatch:hover {
            transform: translateY(-2px);
        }

        .color-display {
            flex-grow: 1;
            display: flex;
            align-items: flex-end;
            padding: 10px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .text-dark {
            color: var(--monochrome-900);
        }

        .text-light {
            color: var(--monochrome-100);
        }
    </style>
</head>

<body>

    <header>
        <div class="header-title">
            <h1>Primitive Tokens Palette</h1>
            <p>Interactive design token viewer for development.</p>
        </div>

        <div class="theme-selector-container">
            <label for="themeSelector">Active Theme Context</label>
            <select id="themeSelector" class="theme-dropdown">
                <option value="">Default Palette</option>
                <optgroup label="Holidays & Events">
                    <option value="theme-new-year">New Year's Day (Ano Novo)</option>
                    <option value="theme-carnival">Carnival Tuesday (Entrudo)</option>
                    <option value="theme-good-friday">Good Friday (Sexta-Feira Santa)</option>
                    <option value="theme-easter">Easter Sunday (Páscoa)</option>
                    <option value="theme-liberty-day">Liberty Day (25 de Abril)</option>
                    <option value="theme-labor-day">Labor Day (1 de Maio)</option>
                    <option value="theme-corpus-christi">Corpus Christi (Corpo de Deus)</option>
                    <option value="theme-portugal-day">Portugal Day (10 de Junho)</option>
                    <option value="theme-assumption-day">Assumption Day (15 de Agosto)</option>
                    <option value="theme-republic-day">Republic Day (5 de Outubro)</option>
                    <option value="theme-all-saints">All Saints' Day (1 de Novembro)</option>
                    <option value="theme-independence-restoration">Independence Restoration (1 de Dezembro)</option>
                    <option value="theme-immaculate-conception">Immaculate Conception (8 de Dezembro)</option>
                    <option value="theme-christmas">Christmas (Natal)</option>
                </optgroup>
                <optgroup label="Seasons">
                    <option value="theme-spring">Spring (Primavera)</option>
                    <option value="theme-summer">Summer (Verão)</option>
                    <option value="theme-autumn">Autumn (Outono)</option>
                    <option value="theme-winter">Winter (Inverno)</option>
                </optgroup>
            </select>
        </div>
    </header>

    <main>
        <h2>Monochrome</h2>
        <section class="color-grid">
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--monochrome-100);">100</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--monochrome-200);">200</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--monochrome-300);">300</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--monochrome-400);">400</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--monochrome-500);">500</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--monochrome-600);">600</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--monochrome-700);">700</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--monochrome-800);">800</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--monochrome-900);">900</div>
            </div>
        </section>

        <h2>Primary</h2>
        <section class="color-grid">
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--primary-100);">100</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--primary-200);">200</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--primary-300);">300</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--primary-400);">400</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--primary-500);">500</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--primary-600);">600</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--primary-700);">700</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--primary-800);">800</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--primary-900);">900</div>
            </div>
        </section>

        <h2>Accent</h2>
        <section class="color-grid">
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--accent-100);">100</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--accent-200);">200</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--accent-300);">300</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--accent-400);">400</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--accent-500);">500</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--accent-600);">600</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--accent-700);">700</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--accent-800);">800</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--accent-900);">900</div>
            </div>
        </section>

        <h2>Neutral</h2>
        <section class="color-grid">
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--neutral-100);">100</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--neutral-200);">200</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--neutral-300);">300</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-dark" style="background-color: var(--neutral-400);">400</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--neutral-500);">500</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--neutral-600);">600</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--neutral-700);">700</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--neutral-800);">800</div>
            </div>
            <div class="color-swatch">
                <div class="color-display text-light" style="background-color: var(--neutral-900);">900</div>
            </div>
        </section>
    </main>

    <script>
        const themeSelector = document.getElementById('themeSelector');
        const body = document.body;

        themeSelector.addEventListener('change', (e) => {
            // Remove any previous theme class attached to body
            const currentThemes = Array.from(body.classList).filter(c => c.startsWith('theme-'));
            currentThemes.forEach(t => body.classList.remove(t));

            // Inject the newly selected theme context if it exists
            const selectedTheme = e.target.value;
            if (selectedTheme) {
                body.classList.add(selectedTheme);
            }
        });
    </script>
</body>

</html>
