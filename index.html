<!DOCTYPE html>
<html lang="en-US" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PassKeep - Authentication Manager</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0d6efd">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
    <link rel="apple-touch-icon" href="./icon-192.png">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .app-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .hidden {
            display: none !important;
        }

        input,
        textarea {
            text-align: start;
        }
    </style>
</head>

<body>

    <div class="app-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="app-title">PassKeep</h2>
            <select id="lang-select" class="form-select w-auto"></select>
        </div>

        <div id="setup-section" class="card shadow-sm p-4 text-center" dir="ltr">
            <h4 data-i18n="welcomeMsg">Welcome! Import a file or create a new one.</h4>
            <div class="mt-4 d-flex flex-column align-items-center gap-3">

                <div class="input-group" style="max-width: 400px;" dir="ltr">
                    <input type="text" id="new-file-name" class="form-control"
                        data-i18n-placeholder="fileNamePlaceholder" placeholder="File name" dir="auto">
                    <span class="input-group-text">.passkeep</span>
                    <button id="btn-create-new" class="btn btn-primary" data-i18n="createNewBtn">Create</button>
                </div>

                <span class="text-muted fw-bold" data-i18n="orText">OR</span>
                <div>
                    <input type="file" id="file-import" accept=".passkeep" class="d-none">
                    <button id="btn-import" class="btn btn-outline-secondary" data-i18n="importBtn">Import File
                        (.passkeep)</button>
                </div>
            </div>
        </div>

        <div id="main-section" class="hidden">
            <div class="d-flex flex-column flex-md-row justify-content-md-between gap-3 mb-3 align-items-sm-center"
                dir="ltr">
                <button id="btn-add-account" class="btn btn-success w-100 w-md-auto" data-bs-toggle="modal"
                    data-bs-target="#editModal" onclick="openCreateAccountModal()">
                    <i class="bi bi-plus-lg me-2"></i> <span data-i18n="addAccountBtn">Add Account</span>
                </button>
                <div class="d-flex align-items-center justify-content-between justify-content-md-end gap-2 w-100 w-md-auto"
                    dir="ltr">
                    <span class="text-muted small" id="display-file-name" dir="ltr"></span>
                    <button id="btn-download" class="btn btn-dark"><i class="bi bi-download me-2"></i> <span
                            data-i18n="downloadBtn">Download</span></button>
                </div>
            </div>

            <div class="row mb-3 align-items-center">
                <div class="col-9 mb-2 mb-md-0">
                    <div class="input-group" dir="ltr">
                        <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
                        <input type="text" id="search-input" class="form-control"
                            data-i18n-placeholder="searchPlaceholder" placeholder="Search site or email...">
                    </div>
                </div>
                <div class="col-3 text-end text-muted small fw-bold" id="account-counter"></div>
            </div>

            <div class="card shadow-sm">
                <ul class="list-group list-group-flush p-0" id="accounts-list"></ul>
            </div>
        </div>
    </div>

    <div class="modal fade" id="viewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" data-i18n="viewAccountTitle">View Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="labelSite">Site/App</label>
                        <input type="text" id="view-site" class="form-control bg-light" readonly dir="auto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="labelId">ID/Email</label>
                        <input type="text" id="view-id" class="form-control bg-light" readonly dir="auto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="labelLastUpdated">Last Updated</label>
                        <input type="text" id="view-last-updated" class="form-control bg-light" readonly dir="auto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="labelPassword">Password</label>

                        <div class="input-group" dir="ltr">
                            <input type="text" id="view-password" class="form-control bg-light" readonly>
                            <button class="btn btn-outline-secondary" type="button" id="btn-copy-password"
                                onclick="copyPasswordToClipboard()" title="Copy Password">
                                <i class="bi bi-clipboard"></i>
                            </button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="labelNotes">Notes</label>
                        <textarea id="view-notes" class="form-control bg-light" rows="3" readonly dir="auto"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalTitle" data-i18n="editAccountTitle">Edit Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="edit-index">
                    <div class="mb-3">
                        <label class="form-label" data-i18n="labelSite">Site/App</label>
                        <input type="text" id="edit-site" class="form-control" required dir="auto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="labelId">ID/Email</label>
                        <input type="text" id="edit-id" class="form-control" required dir="auto">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="labelPassword">Password</label>

                        <div class="input-group" dir="ltr">
                            <input type="text" id="edit-password" class="form-control" required>
                            <button class="btn btn-outline-primary" type="button" onclick="generateSecurePassword()"
                                data-i18n="btnGenerate">Generate</button>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" data-i18n="labelNotes">Notes (optional)</label>
                        <textarea id="edit-notes" class="form-control" rows="3" dir="auto"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                        data-i18n="btnCancel">Cancel</button>
                    <button type="button" class="btn btn-primary" onclick="saveAccountDetails()"
                        data-i18n="btnSave">Save</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content border-0">
                <div class="modal-header text-bg-danger">
                    <h5 class="modal-title" data-i18n="deleteAccountTitle">Delete Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p data-i18n="deleteConfirmMsg">Are you sure you want to delete the following account?</p>
                    <strong id="delete-site-name" dir="auto"></strong>
                    <input type="hidden" id="delete-index">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal"
                        data-i18n="btnCancel">Cancel</button>
                    <button type="button" class="btn btn-danger" onclick="confirmAccountDeletion()"
                        data-i18n="btnDelete">Delete
                        Account</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="alertModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0">
                <div class="modal-header text-bg-warning">
                    <h5 class="modal-title text-dark"><i class="bi bi-exclamation-triangle-fill me-2"></i><span
                            data-i18n="alertTitle">Atenção</span></h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-center p-4">
                    <p id="alert-message" class="mb-0 fs-5"></p>
                </div>
                <div class="modal-footer justify-content-center border-0 pb-4">
                    <button type="button" class="btn btn-dark px-4" data-bs-dismiss="modal"
                        data-i18n="btnOk">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        /**
         * Exibe um alerta usando o modal do Bootstrap com suporte a i18n
         * @param {string} i18nKey - A chave do dicionário para a mensagem de erro
         */
        function showAppAlert(i18nKey) {
            const dictionary = i18n[currentLang] || i18n["en-US"];
            // Procura a tradução da mensagem. Se não encontrar a chave, mostra o texto que foi passado
            const message = dictionary[i18nKey] || i18nKey;

            document.getElementById("alert-message").innerText = message;

            // Instancia e mostra o modal
            const alertModal = new bootstrap.Modal(document.getElementById("alertModal"));
            alertModal.show();
        }



        /**
         * Retorna a data atual no formato YYYY/MM/DD - HH:MM:SS
         * @returns {string}
         */
        function getCurrentFormattedDate() {
            const now = new Date();
            const pad = num => String(num).padStart(2, '0');

            const year = now.getFullYear();
            const month = pad(now.getMonth() + 1);
            const day = pad(now.getDate());
            const hours = pad(now.getHours());
            const minutes = pad(now.getMinutes());
            const seconds = pad(now.getSeconds());

            return `${year}/${month}/${day} - ${hours}:${minutes}:${seconds}`;
        }





        /**
         * Dictionary object containing all localization strings.
         * Restricted to en-US based on project constraints.
         * @type {Object}
         */
        const i18n = {
            "en-US": {
                "_langName": "English (United States)",
                "_isRTL": false,
                "welcomeMsg": "Welcome! Import a file or create a new one.",
                "fileNamePlaceholder": "File name",
                "createNewBtn": "Create",
                "orText": "Or",
                "importBtn": "Import file (.passkeep)",
                "addAccountBtn": "Add account",
                "downloadBtn": "Download",
                "viewAccountTitle": "View account",
                "editAccountTitle": "Edit account",
                "deleteAccountTitle": "Delete account",
                "labelSite": "Site or app",
                "labelId": "ID or email",
                "labelLastUpdated": "Last updated",
                "labelPassword": "Password",
                "labelNotes": "Notes (optional)",
                "btnGenerate": "Generate",
                "btnCancel": "Cancel",
                "btnSave": "Save",
                "btnDelete": "Delete account",
                "deleteConfirmMsg": "Delete this account?",
                "emptyList": "No accounts found.",
                "searchPlaceholder": "Search sites or emails",
                "accountsCountLabel": "accounts",
                "alertTitle": "Warning",
                "btnOk": "OK",
                "errNoFileName": "Enter a file name.",
                "errInvalidFile": "Couldn't read the file. Make sure it's a valid .passkeep file.",
                "errEmptyFields": "Enter a site, ID, and password.",
                "errCopyFailed": "Couldn't copy the password."
            },
            "pt-PT": {
                "_langName": "Português (Portugal)",
                "_isRTL": false,
                "welcomeMsg": "Bem-vindo. Importe um ficheiro ou crie um novo.",
                "fileNamePlaceholder": "Nome do ficheiro",
                "createNewBtn": "Criar",
                "orText": "Ou",
                "importBtn": "Importar ficheiro (.passkeep)",
                "addAccountBtn": "Adicionar conta",
                "downloadBtn": "Transferir",
                "viewAccountTitle": "Ver conta",
                "editAccountTitle": "Editar conta",
                "deleteAccountTitle": "Eliminar conta",
                "labelSite": "Site ou aplicação",
                "labelId": "ID ou e-mail",
                "labelLastUpdated": "Última atualização",
                "labelPassword": "Palavra-passe",
                "labelNotes": "Notas (opcional)",
                "btnGenerate": "Gerar",
                "btnCancel": "Cancelar",
                "btnSave": "Guardar",
                "btnDelete": "Eliminar conta",
                "deleteConfirmMsg": "Eliminar esta conta?",
                "emptyList": "Nenhuma conta encontrada.",
                "searchPlaceholder": "Pesquisar sites ou e-mails",
                "accountsCountLabel": "contas",
                "alertTitle": "Aviso",
                "btnOk": "OK",
                "errNoFileName": "Introduza um nome de ficheiro.",
                "errInvalidFile": "Não foi possível ler o ficheiro. Certifique-se de que é um ficheiro .passkeep válido.",
                "errEmptyFields": "Introduza um site, ID e palavra-passe.",
                "errCopyFailed": "Não foi possível copiar a palavra-passe."
            }
        };

        /** @type {string} */
        let currentLang = "en-US";

        /** @type {Array<Object>} */
        let accountsData = [];

        /** @type {string} */
        let currentFileName = "my_accounts.passkeep";

        document.addEventListener("DOMContentLoaded", () => {
            populateLanguageSelect();
            applyTranslations(currentLang);

            document.getElementById("lang-select").addEventListener("change", (e) => {
                currentLang = e.target.value;
                applyTranslations(currentLang);
                const currentSearch = document.getElementById("search-input").value;
                renderAccountList(currentSearch);
            });

            document.getElementById("search-input").addEventListener("input", (e) => {
                renderAccountList(e.target.value);
            });

            document.getElementById("btn-create-new").addEventListener("click", initializeNewFile);
            document.getElementById("btn-import").addEventListener("click", () => document.getElementById("file-import").click());
            document.getElementById("file-import").addEventListener("change", importFileFromDisk);
            document.getElementById("btn-download").addEventListener("click", saveFileToDisk);
        });

        /**
         * Populates the HTML select element with available languages from the i18n object.
         * @returns {void}
         */
        function populateLanguageSelect() {
            const selectElement = document.getElementById("lang-select");
            selectElement.innerHTML = "";

            Object.keys(i18n).forEach(langKey => {
                const optionElement = document.createElement("option");
                optionElement.value = langKey;
                optionElement.innerText = i18n[langKey]._langName || langKey;

                if (langKey === currentLang) {
                    optionElement.selected = true;
                }
                selectElement.appendChild(optionElement);
            });
        }

        /**
         * Applies the selected language translations to all elements containing the `data-i18n` attribute.
         * @param {string} languageCode - The language key to apply (e.g., "en-US").
         * @returns {void}
         */
        function applyTranslations(languageCode) {
            const dictionary = i18n[languageCode] || i18n["en-US"];

            document.documentElement.lang = languageCode;
            document.documentElement.dir = dictionary._isRTL ? "rtl" : "ltr";

            document.querySelectorAll("[data-i18n]").forEach(element => {
                const translationKey = element.getAttribute("data-i18n");
                if (dictionary[translationKey]) element.innerText = dictionary[translationKey];
            });

            document.querySelectorAll("[data-i18n-placeholder]").forEach(element => {
                const placeholderKey = element.getAttribute("data-i18n-placeholder");
                if (dictionary[placeholderKey]) element.placeholder = dictionary[placeholderKey];
            });
        }

        /**
         * Initializes a new .passkeep file structure and transitions the view to the main dashboard.
         * @returns {void}
         */
        function initializeNewFile() {
            const inputFileName = document.getElementById("new-file-name").value.trim();
            if (!inputFileName) {
                showAppAlert("errNoFileName");
                return;
            }
            currentFileName = inputFileName.endsWith('.passkeep') ? inputFileName : inputFileName + ".passkeep";
            accountsData = [];
            displayMainSection();
        }

        /**
         * Reads a selected local file and parses it into the application state.
         * @param {Event} event - The file input change event.
         * @returns {void}
         */
        function importFileFromDisk(event) {
            const targetFile = event.target.files[0];
            if (!targetFile) return;

            currentFileName = targetFile.name;

            const fileReader = new FileReader();
            fileReader.onload = function (readEvent) {
                try {
                    accountsData = JSON.parse(readEvent.target.result);
                    displayMainSection();
                } catch (error) {
                    showAppAlert("errInvalidFile");
                }
            };
            fileReader.readAsText(targetFile);
        }

        /**
         * Toggles the UI layout from the setup section to the main password dashboard.
         * @returns {void}
         */
        function displayMainSection() {
            document.getElementById("setup-section").classList.add("hidden");
            document.getElementById("main-section").classList.remove("hidden");
            document.getElementById("display-file-name").innerText = currentFileName;
            document.getElementById("search-input").value = "";
            renderAccountList();
        }

        /**
         * Serializes the application state into a JSON blob and initiates a file download prompt.
         * @returns {Promise<void>}
         */
        async function saveFileToDisk() {
            const dataString = JSON.stringify(accountsData, null, 2);
            const dataBlob = new Blob([dataString], { type: "application/json" });

            if (window.showSaveFilePicker) {
                try {
                    const fileHandle = await window.showSaveFilePicker({
                        suggestedName: currentFileName,
                        types: [{
                            description: 'PassKeep File',
                            accept: { 'application/json': ['.passkeep'] },
                        }],
                    });
                    const writableStream = await fileHandle.createWritable();
                    await writableStream.write(dataBlob);
                    await writableStream.close();
                } catch (error) {
                    if (error.name !== 'AbortError') console.error(error);
                }
            } else {
                const objectUrl = URL.createObjectURL(dataBlob);
                const anchorElement = document.createElement("a");
                anchorElement.href = objectUrl;
                anchorElement.download = currentFileName;
                document.body.appendChild(anchorElement);
                anchorElement.click();
                document.body.removeChild(anchorElement);
                URL.revokeObjectURL(objectUrl);
            }
        }

        /**
         * Renders the list of accounts based on the provided search term.
         * @param {string} [searchTerm=""] - The string used to filter accounts by site or ID.
         * @returns {void}
         */
        function renderAccountList(searchTerm = "") {
            const listContainer = document.getElementById("accounts-list");
            const counterElement = document.getElementById("account-counter");
            listContainer.innerHTML = "";

            const dictionary = i18n[currentLang] || i18n["en-US"];
            const searchPattern = searchTerm.toLowerCase();

            const filteredAccounts = accountsData.filter(account =>
                account.site.toLowerCase().includes(searchPattern) ||
                account.id.toLowerCase().includes(searchPattern)
            );

            counterElement.innerText = `${filteredAccounts.length} / ${accountsData.length} ${dictionary.accountsCountLabel}`;

            if (filteredAccounts.length === 0) {
                listContainer.innerHTML = `<li class="list-group-item text-muted text-center">${dictionary.emptyList}</li>`;
                return;
            }

            filteredAccounts.forEach((account) => {
                const originalIndex = accountsData.indexOf(account);

                let alertHtmlString = "";
                if (account.lastUpdated) {
                    let lastUpdatedTimestamp = account.lastUpdated;

                    // Se for string, preparamos para o Javascript converter de forma nativa
                    if (typeof account.lastUpdated === "string") {
                        let safeDateString = account.lastUpdated.replace(" - ", " ");
                        lastUpdatedTimestamp = new Date(safeDateString).getTime();
                    }

                    // Calcula os dias. Se por algum motivo a data for inválida (NaN), fallback para 0
                    if (isNaN(lastUpdatedTimestamp)) {
                        lastUpdatedTimestamp = Date.now();
                    }

                    const daysSinceUpdate = Math.floor((Date.now() - lastUpdatedTimestamp) / (1000 * 60 * 60 * 24));

                    // Lógica original para mostrar as bolinhas de aviso
                    if (daysSinceUpdate >= 180) {
                        alertHtmlString = `<span class="badge bg-danger rounded-pill ms-2" title="Updated over 180 days ago"><i class="bi bi-exclamation-triangle"></i></span>`;
                    } else if (daysSinceUpdate >= 90) {
                        alertHtmlString = `<span class="badge bg-warning text-dark rounded-pill ms-2" title="Updated over 90 days ago"><i class="bi bi-clock-history"></i></span>`;
                    }
                } // <-- Aqui está a chaveta que faltava!

                const listItemElement = document.createElement("li");
                listItemElement.className = "list-group-item d-flex justify-content-between align-items-center";
                listItemElement.innerHTML = `
                <div>
                    <span class="fw-bold" dir="auto">${account.site}</span>
                    <span class="text-muted ms-2 small d-none d-sm-inline" dir="auto">(${account.id})</span>
                    ${alertHtmlString}
                </div>
                <div>
                    <button class="btn btn-sm btn-info me-1" onclick="openViewAccountModal(${originalIndex})" title="View"><i class="bi bi-eye"></i></button>
                    <button class="btn btn-sm btn-warning me-1" onclick="openEditAccountModal(${originalIndex})" title="Edit"><i class="bi bi-pencil"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="openDeleteAccountModal(${originalIndex})" title="Delete"><i class="bi bi-trash"></i></button>
                </div>
            `;
                listContainer.appendChild(listItemElement);
            });
        }

        /**
         * Populates and displays the modal to view specific account details.
         * @param {number} accountIndex - The array index of the account to view.
         * @returns {void}
         */
        function openViewAccountModal(accountIndex) {
            const targetAccount = accountsData[accountIndex];
            document.getElementById("view-site").value = targetAccount.site;
            document.getElementById("view-id").value = targetAccount.id;
            document.getElementById("view-password").value = targetAccount.password;
            document.getElementById("view-notes").value = targetAccount.notes || "";
            document.getElementById("view-last-updated").value = targetAccount.lastUpdated || "-";

            const copyButtonIcon = document.getElementById("btn-copy-password").querySelector("i");
            copyButtonIcon.className = "bi bi-clipboard";

            new bootstrap.Modal(document.getElementById("viewModal")).show();
        }

        /**
         * Copies the currently viewed password to the user's system clipboard.
         * @returns {void}
         */
        function copyPasswordToClipboard() {
            const passwordValue = document.getElementById("view-password").value;
            if (!passwordValue) return;

            navigator.clipboard.writeText(passwordValue).then(() => {
                const copyButtonElement = document.getElementById("btn-copy-password");
                const iconElement = copyButtonElement.querySelector("i");

                iconElement.className = "bi bi-check-lg text-success";

                setTimeout(() => {
                    iconElement.className = "bi bi-clipboard";
                }, 2000);
            }).catch(error => {
                console.error("Clipboard copy failed: ", error);
                showAppAlert("errCopyFailed");
            });
        }

        /**
         * Clears the input fields and prepares the modal for creating a new account.
         * @returns {void}
         */
        function openCreateAccountModal() {
            document.getElementById("edit-index").value = "-1";
            document.getElementById("edit-site").value = "";
            document.getElementById("edit-id").value = "";
            document.getElementById("edit-password").value = "";
            document.getElementById("edit-notes").value = "";
        }

        /**
         * Populates and displays the modal for editing an existing account.
         * @param {number} accountIndex - The array index of the account to edit.
         * @returns {void}
         */
        function openEditAccountModal(accountIndex) {
            const targetAccount = accountsData[accountIndex];
            document.getElementById("edit-index").value = accountIndex;
            document.getElementById("edit-site").value = targetAccount.site;
            document.getElementById("edit-id").value = targetAccount.id;
            document.getElementById("edit-password").value = targetAccount.password;
            document.getElementById("edit-notes").value = targetAccount.notes || "";
            new bootstrap.Modal(document.getElementById("editModal")).show();
        }

        /**
         * Validates and saves account details from the edit modal into the application state.
         * @returns {void}
         */
        function saveAccountDetails() {
            const accountIndex = parseInt(document.getElementById("edit-index").value);
            const siteInput = document.getElementById("edit-site").value.trim();
            const idInput = document.getElementById("edit-id").value.trim();
            const passwordInput = document.getElementById("edit-password").value.trim();
            const notesInput = document.getElementById("edit-notes").value.trim();

            if (!siteInput || !idInput || !passwordInput) {
                showAppAlert("errEmptyFields");
                return;
            }

            const updatedAccount = {
                site: siteInput,
                id: idInput,
                password: passwordInput,
                notes: notesInput,
                lastUpdated: getCurrentFormattedDate()
            };

            if (accountIndex === -1) {
                accountsData.push(updatedAccount);
            } else {
                accountsData[accountIndex] = updatedAccount;
            }

            const currentSearchTerm = document.getElementById("search-input").value;
            renderAccountList(currentSearchTerm);
            bootstrap.Modal.getInstance(document.getElementById("editModal")).hide();
        }

        /**
         * Prepares and displays the confirmation modal for deleting an account.
         * @param {number} accountIndex - The array index of the account flagged for deletion.
         * @returns {void}
         */
        function openDeleteAccountModal(accountIndex) {
            document.getElementById("delete-index").value = accountIndex;
            document.getElementById("delete-site-name").innerText = accountsData[accountIndex].site;
            new bootstrap.Modal(document.getElementById("deleteModal")).show();
        }

        /**
         * Removes the specified account from the application state and updates the view.
         * @returns {void}
         */
        function confirmAccountDeletion() {
            const accountIndex = parseInt(document.getElementById("delete-index").value);
            accountsData.splice(accountIndex, 1);

            const currentSearchTerm = document.getElementById("search-input").value;
            renderAccountList(currentSearchTerm);
            bootstrap.Modal.getInstance(document.getElementById("deleteModal")).hide();
        }

        /**
         * Generates a secure, 32-character random string and inserts it into the edit password field.
         * @returns {void}
         */
        function generateSecurePassword() {
            const passwordLength = 32;
            const uppercaseChars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const lowercaseChars = "abcdefghijklmnopqrstuvwxyz";
            const numericChars = "0123456789";
            const specialChars = "'-!\"#$%&()*,./:;?@[]_{|}+<=>";

            const allValidChars = uppercaseChars + lowercaseChars + numericChars + specialChars;
            let generatedPassword = "";

            generatedPassword += uppercaseChars[Math.floor(Math.random() * uppercaseChars.length)];
            generatedPassword += lowercaseChars[Math.floor(Math.random() * lowercaseChars.length)];
            generatedPassword += numericChars[Math.floor(Math.random() * numericChars.length)];
            generatedPassword += specialChars[Math.floor(Math.random() * specialChars.length)];

            for (let index = generatedPassword.length; index < passwordLength; index++) {
                generatedPassword += allValidChars[Math.floor(Math.random() * allValidChars.length)];
            }

            generatedPassword = generatedPassword.split('').sort(() => 0.5 - Math.random()).join('');
            document.getElementById("edit-password").value = generatedPassword;
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => {
                        console.log('Service Worker registered successfully.');
                    })
                    .catch(error => {
                        console.error('Service Worker registration failed:', error);
                    });
            });
        }
    </script>
</body>
